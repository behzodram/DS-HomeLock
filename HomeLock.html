<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Smart Lock Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 6px;
        }

        .header p {
            color: #666;
            font-size: 13px;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0 20px 20px;
            overflow-y: auto;
        }

        .status-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
            color: white;
            flex-shrink: 0;
        }

        .status-icon {
            font-size: 56px;
            margin-bottom: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .status-text {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .status-subtitle {
            font-size: 13px;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .control-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            touch-action: manipulation;
        }

        .unlock-btn {
            background: #10b981;
            color: white;
        }

        .unlock-btn:active {
            background: #059669;
            transform: scale(0.95);
        }

        .lock-btn {
            background: #ef4444;
            color: white;
        }

        .lock-btn:active {
            background: #dc2626;
            transform: scale(0.95);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-icon {
            font-size: 22px;
        }

        .info-section {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 16px;
            flex-shrink: 0;
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #6b7280;
            font-size: 13px;
        }

        .info-value {
            color: #111827;
            font-weight: 600;
            font-size: 13px;
        }

        .connection-status {
            text-align: center;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .connected {
            background: #d1fae5;
            color: #065f46;
        }

        .disconnected {
            background: #fee2e2;
            color: #991b1b;
        }

        .connecting {
            background: #fef3c7;
            color: #92400e;
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            display: none;
            flex-shrink: 0;
        }

        @media (min-width: 421px) {
            .container {
                border-radius: 24px;
                max-height: 90vh;
            }
        }

        @media (max-height: 700px) {
            .header {
                padding: 20px 20px 15px;
            }
            
            .header h1 {
                font-size: 22px;
            }
            
            .status-card {
                padding: 20px;
            }
            
            .status-icon {
                font-size: 48px;
            }
            
            .status-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Smart Lock</h1>
            <p>Eshikni masofadan boshqaring</p>
        </div>

        <div class="content-wrapper">
            <div id="connectionStatus" class="connection-status connecting">
                ⏳ Firebase'ga ulanilmoqda...
            </div>

            <div id="errorMessage" class="error-message"></div>

            <div class="status-card">
                <div id="statusIcon" class="status-icon">🔒</div>
                <div id="statusText" class="status-text">Yuklanmoqda...</div>
                <div class="status-subtitle">Hozirgi holat</div>
            </div>

            <div class="button-group">
                <button id="unlockBtn" class="control-btn unlock-btn" disabled>
                    <span class="btn-icon">🔓</span>
                    <span>Ochish</span>
                </button>
                <button id="lockBtn" class="control-btn lock-btn" disabled>
                    <span class="btn-icon">🔒</span>
                    <span>Yopish</span>
                </button>
            </div>

            <div class="info-section">
                <div class="info-item">
                    <span class="info-label">Status</span>
                    <span id="infoStatus" class="info-value">Kutilmoqda...</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Oxirgi harakat</span>
                    <span id="lastAction" class="info-value">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Aloqa</span>
                    <span id="connectionInfo" class="info-value">Ulanmoqda...</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD_TqjGJyTrR-0Km0KKOhV36kKCQ2IZJ1M",
            authDomain: "homelock-c5f52.firebaseapp.com",
            databaseURL: "https://homelock-c5f52-default-rtdb.firebaseio.com",
            projectId: "homelock-c5f52",
            storageBucket: "homelock-c5f52.firebasestorage.app",
            messagingSenderId: "771505226769",
            appId: "1:771505226769:web:9c67e6276a5d5b10dd5db0"
        };

        // Element references
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const infoStatus = document.getElementById('infoStatus');
        const lastAction = document.getElementById('lastAction');
        const unlockBtn = document.getElementById('unlockBtn');
        const lockBtn = document.getElementById('lockBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const connectionInfo = document.getElementById('connectionInfo');
        const errorMessage = document.getElementById('errorMessage');

        let app, database;
        let isConnected = false;

        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        // Initialize Firebase
        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            console.log('✓ Firebase ishga tushirildi');
            
            setupListeners();
            
        } catch (error) {
            console.error('Firebase xatosi:', error);
            showError('Firebase ishga tushirishda xatolik: ' + error.message);
        }

        // Setup Firebase listeners
        function setupListeners() {
            const statusRef = ref(database, 'lock/status');
            const lastActionRef = ref(database, 'lock/lastActionTime');
            
            // Listen to status changes
            onValue(statusRef, (snapshot) => {
                const status = snapshot.val();
                console.log('Status o\'zgardi:', status);
                updateUI(status);
                
                if (!isConnected) {
                    isConnected = true;
                    connectionStatus.textContent = '✓ Ulandi';
                    connectionStatus.className = 'connection-status connected';
                    connectionInfo.textContent = 'Online';
                    unlockBtn.disabled = false;
                    lockBtn.disabled = false;
                    hideError();
                }
            }, (error) => {
                console.error('Status o\'qishda xato:', error);
                showError('Ma\'lumotlarni o\'qishda xato: ' + error.message);
                isConnected = false;
                connectionStatus.textContent = '✗ Ulanishda muammo';
                connectionStatus.className = 'connection-status disconnected';
                connectionInfo.textContent = 'Offline';
            });

            // Listen to last action time
            onValue(lastActionRef, (snapshot) => {
                const timestamp = snapshot.val();
                if (timestamp) {
                    const date = new Date(timestamp);
                    const now = new Date();
                    
                    // Check if today
                    const isToday = date.toDateString() === now.toDateString();
                    
                    if (isToday) {
                        // Show only time if today
                        lastAction.textContent = date.toLocaleTimeString('uz-UZ', {
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    } else {
                        // Show date and time if not today
                        lastAction.textContent = date.toLocaleDateString('uz-UZ', {
                            day: '2-digit',
                            month: '2-digit'
                        }) + ' ' + date.toLocaleTimeString('uz-UZ', {
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    }
                }
            });
        }

        // Send command to Firebase
        async function sendCommand(command) {
            if (!isConnected) {
                showError('Firebase bilan aloqa yo\'q!');
                return;
            }

            try {
                unlockBtn.disabled = true;
                lockBtn.disabled = true;

                console.log('Buyruq yuborilmoqda:', command);
                
                await set(ref(database, 'lock/command'), command);
                await set(ref(database, 'lock/lastActionTime'), Date.now());
                
                console.log('✓ Buyruq yuborildi');
                
                setTimeout(() => {
                    if (isConnected) {
                        unlockBtn.disabled = false;
                        lockBtn.disabled = false;
                    }
                }, 800);
                
            } catch (error) {
                console.error('Buyruq yuborishda xato:', error);
                showError('Buyruq yuborishda xato: ' + error.message);
                unlockBtn.disabled = false;
                lockBtn.disabled = false;
            }
        }

        // Update UI based on status
        function updateUI(status) {
            if (status === 'unlocked') {
                statusIcon.textContent = '🔓';
                statusText.textContent = 'Ochiq';
                infoStatus.textContent = 'Ochiq';
                infoStatus.style.color = '#10b981';
            } else if (status === 'locked') {
                statusIcon.textContent = '🔒';
                statusText.textContent = 'Yopiq';
                infoStatus.textContent = 'Yopiq';
                infoStatus.style.color = '#ef4444';
            } else {
                statusIcon.textContent = '❓';
                statusText.textContent = 'Noma\'lum';
                infoStatus.textContent = 'Noma\'lum';
                infoStatus.style.color = '#6b7280';
            }
        }

        // Show error message
        function showError(message) {
            errorMessage.textContent = '⚠️ ' + message;
            errorMessage.style.display = 'block';
        }

        // Hide error message
        function hideError() {
            errorMessage.style.display = 'none';
        }

        // Button event listeners
        unlockBtn.addEventListener('click', () => {
            sendCommand('unlock');
        });

        lockBtn.addEventListener('click', () => {
            sendCommand('lock');
        });

        // Check connection periodically
        setInterval(() => {
            if (!isConnected) {
                connectionStatus.textContent = '⚠️ Qayta ulanilmoqda...';
                connectionStatus.className = 'connection-status connecting';
            }
        }, 5000);
    </script>
</body>
</html>
